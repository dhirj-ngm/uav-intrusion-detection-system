<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AI UAV IDS Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="bi bi-shield-shaded"></i></div>
        <div>
          <h4>UAV IDS</h4>
          <p>Threat Command Center</p>
        </div>
      </div>

      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="bi bi-layout-sidebar-inset"></i>
      </button>

      <nav class="nav-links">
        <a class="nav-item active" href="{{ url_for('views.dashboard') }}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
        <a class="nav-item" href="#uploadSection"><i class="bi bi-cloud-arrow-up"></i><span>Upload Dataset</span></a>
        <a class="nav-item" href="#predictionSection"><i class="bi bi-cpu"></i><span>Live Detection</span></a>
        <a class="nav-item" href="#chartsSection"><i class="bi bi-bar-chart-line"></i><span>Analytics</span></a>
        <a class="nav-item" href="#resultsSection"><i class="bi bi-journal-text"></i><span>Attack Reports</span></a>
        <a class="nav-item" href="#performanceSection"><i class="bi bi-graph-up-arrow"></i><span>Model Performance</span></a>
        <a class="nav-item" href="#downloadSection"><i class="bi bi-download"></i><span>Settings</span></a>
      </nav>
    </div>

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>AI UAV IDS</span>
      <span>Developed by the team</span>
      <span>© 2026 All Rights Reserved</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
